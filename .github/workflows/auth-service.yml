name: auth-service — CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/auth-service/**"
      - ".github/workflows/auth-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/auth-service/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ${{ secrets.AZURE_ACR_REGISTRY_URL_AUTH }}
  SERVICE: auth-service
  IMAGE_NAME: vedda-system-auth-service

jobs:
  audit:
    name: Install & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/auth-service/package-lock.json
      - name: Install dependencies
        working-directory: backend/auth-service
        run: npm ci --omit=dev
      - name: npm audit
        working-directory: backend/auth-service
        run: npm audit --audit-level=high
        continue-on-error: true

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan backend/auth-service
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [audit, security-scan]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        run: |
          echo "${{ secrets.AZURE_ACR_PASSWORD_AUTH }}" | docker login \
            -u "${{ secrets.AZURE_ACR_USERNAME_AUTH }}" \
            --password-stdin "${{ env.REGISTRY }}"
      - name: Build and Push
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
                       -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
                       backend/auth-service
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.SERVICE }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              --set-env-vars \
                "PORT=5005" \
                "MONGODB_URI=${{ secrets.MONGODB_URI }}" \
                "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
                "JWT_EXPIRE=1d" \
                "BUILD_ID=${{ github.run_id }}" \
                "BUILD_SHA=${{ github.sha }}"