name: translator-service — CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/translator-service/**"
      - ".github/workflows/translator-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/translator-service/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ${{ secrets.AZURE_ACR_REGISTRY_URL_TRANSLATOR }}
  SERVICE: translator-service
  IMAGE_NAME: vedda-system-translator-service

jobs:
  audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        working-directory: backend/translator-service
        run: pip install -r requirements.txt
      - name: Run pip-audit
        working-directory: backend/translator-service
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t ${{ env.IMAGE_NAME }}:scan backend/translator-service
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [audit, security-scan]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to ACR
        run: |
          echo "${{ secrets.AZURE_ACR_PASSWORD_TRANSLATOR }}" | docker login \
            -u "${{ secrets.AZURE_ACR_USERNAME_TRANSLATOR }}" \
            --password-stdin "${{ env.REGISTRY }}"
      - name: Build and Push
        run: |
          docker build -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
                       -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
                       backend/translator-service
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.SERVICE }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              --set-env-vars \
                "PORT=5001" \
                "DICTIONARY_SERVICE_URL=http://dictionary-service/api/dictionary" \
                "HISTORY_SERVICE_URL=http://history-service" \
                "BUILD_ID=${{ github.run_id }}" \
                "BUILD_SHA=${{ github.sha }}"