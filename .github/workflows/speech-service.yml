name: speech-service — CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/speech-service/**"
      - ".github/workflows/speech-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/speech-service/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ${{ secrets.AZURE_ACR_REGISTRY_URL_SPEECH }}
  SERVICE: speech-service
  IMAGE_NAME: vedda-system-speech-service

jobs:
  audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        working-directory: backend/speech-service
        run: |
          pip install pip-audit flask flask-cors requests python-dotenv pymongo
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
        continue-on-error: true

  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy scanner on base
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "python:3.9-slim"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  build-and-push:
    name: Build & Push Docker Image (with Trained Model)
    runs-on: ubuntu-latest
    needs: [audit, security-scan]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install AzCopy
        run: |
          wget -O azcopy.tar.gz https://aka.ms/downloadazcopy-v10-linux
          tar -xzf azcopy.tar.gz --strip-components=1
          sudo mv azcopy /usr/local/bin/
      - name: Download Model
        run: |
          azcopy copy "${{ secrets.AZURE_BLOB_SAS_URL_SPEECH_MODEL }}" "backend/speech-service/vedda_whisper_finetuned" --recursive
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /opt/ghc
          df -h
      - name: Login to ACR
        run: |
          echo "${{ secrets.AZURE_ACR_PASSWORD_SPEECH }}" | docker login -u "${{ secrets.AZURE_ACR_USERNAME_SPEECH }}" --password-stdin "${{ env.REGISTRY }}"
      - name: Build and Push
        run: |
          docker build \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            backend/speech-service
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
      - name: Cleanup model from runner
        if: always()
        run: rm -rf backend/speech-service/vedda_whisper_finetuned/

  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Update Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ env.SERVICE }} \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              --cpu 1.0 --memory 2.0Gi \
              --set-env-vars \
                "PORT=5007" \
                "MONGODB_URI=${{ secrets.MONGODB_URI }}" \
                "DATABASE_NAME=vedda-system" \
                "AUDIO_STORAGE_PATH=/app/audio_data" \
                "TEMP_AUDIO_PATH=/app/temp" \
                "BUILD_ID=${{ github.run_id }}" \
                "BUILD_SHA=${{ github.sha }}"